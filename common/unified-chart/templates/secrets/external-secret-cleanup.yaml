{{- if and .Values.externalSecret.enabled .Values.externalSecret.cleanup.enabled }}
{{- $cleanup := .Values.externalSecret.cleanup }}
{{- $saName := printf "%s-secret-cleanup" (include "name" .) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  labels:
    {{- include "labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $saName }}
  labels:
    {{- include "labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $saName }}
  labels:
    {{- include "labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $saName }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $saName }}
  labels:
    {{- include "cronjob.labels" . | nindent 4 }}
spec:
  schedule: {{ $cleanup.schedule | quote }}
  concurrencyPolicy: {{ $cleanup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ $cleanup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $cleanup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ $cleanup.backoffLimit }}
      ttlSecondsAfterFinished: {{ $cleanup.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- include "job.labels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ $saName }}
          restartPolicy: {{ $cleanup.restartPolicy }}
          containers:
            - name: cleanup
              image: {{ $cleanup.image | quote }}
              imagePullPolicy: {{ $cleanup.imagePullPolicy }}
              resources:
                {{- toYaml $cleanup.resources | nindent 16 }}
              env:
                - name: SECRET_PREFIX
                  value: {{ printf "%s-" (include "name" .) | quote }}
                - name: CURRENT_SECRET
                  value: {{ include "secret.name" . | quote }}
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "namespace=$NAMESPACE prefix=$SECRET_PREFIX current=$CURRENT_SECRET"

                  referenced=$(kubectl get pods -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*].spec.volumes[*]}{.secret.secretName}{"\n"}{end}' \
                    | sort -u | sed '/^$/d')

                  candidates=$(kubectl get secrets -n "$NAMESPACE" \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
                    | grep "^${SECRET_PREFIX}" || true)

                  echo "$candidates" | while IFS= read -r name; do
                    [ -z "$name" ] && continue
                    if [ "$name" = "$CURRENT_SECRET" ]; then
                      echo "skip current: $name"
                      continue
                    fi
                    if printf '%s\n' "$referenced" | grep -qFx "$name"; then
                      echo "skip in-use: $name"
                      continue
                    fi
                    echo "delete: $name"
                    kubectl delete secret -n "$NAMESPACE" "$name" --ignore-not-found
                  done
{{- end }}
