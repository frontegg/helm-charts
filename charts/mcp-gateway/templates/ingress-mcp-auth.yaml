{{- if .Values.ingress.mcpAuth.enabled -}}
{{- $fullName := include "fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-auth-ingress
  labels:
    {{- include "commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-auth
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_clear_input_headers "Host" "X-Forwarded-Host";
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
      proxy_set_header X-Trace-ID $opentelemetry_trace_id;
    nginx.ingress.kubernetes.io/enable-opentelemetry: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 4m
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header Cache-Control "no-transform";
      location ~* ^/(frontegg/)?(metrics|healthcheck)$ {
        deny all;
        return 403;
      }
    {{- with .Values.ingress.mcpAuth.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "mcp-gw.george-clooney.venv.life"
      secretName: frontegg-secret-2020
  rules:
    - host: "mcp-gw.george-clooney.venv.life"
      http:
        paths:
        - path: /.well-known
          pathType: Prefix
          backend:
            service:
              name: {{ $fullName }}-auth
              port:
                number: 8080
{{- end }}
