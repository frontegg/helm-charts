apiVersion: v1
kind: Service
metadata:
  name: {{ include "fullname" . }}-gw
  labels:
    {{- include "commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gw
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.mcpGw.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gw
