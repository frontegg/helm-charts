# Example values file for mcp-gateway
# Copy this file and customize for your environment:
#   cp values-example.yaml my-values.yaml
#   helm install mcp-gateway ./charts/mcp-gateway -f my-values.yaml

# Image configuration
mcpAuth:
  replicaCount: 1

mcpGw:
  replicaCount: 1

# Environment variables (shared by both mcp-auth and mcp-gw)
env:
  redisHost: "<your-redis-host>"
  redisTlsEnabled: "false"
  fronteggRegion: "eu"
  vendorClientId: "<your-vendor-client-id>"
  vendorClientSecret: "<your-vendor-client-secret>"
  applicationId: "<your-application-id>"
  externalAuthorizationUrl: "<your-external-authorization-url>"
  externalAuthorizationApplicationId: "<your-application-id>"


# Optional: Pull secrets for private registries
# imagePullSecrets:
#   - name: my-registry-secret

# Optional: Resource customization
# mcpAuth:
#   resources:
#     requests:
#       cpu: 500m
#       memory: 512Mi
#     limits:
#       memory: 1Gi

# Optional: Enable autoscaling
# autoscaling:
#   mcpAuth:
#     enabled: true
#     minReplicas: 2
#     maxReplicas: 10
#     targetCPUUtilizationPercentage: 70
#   mcpGw:
#     enabled: true
#     minReplicas: 2
#     maxReplicas: 10
#     targetCPUUtilizationPercentage: 70
